name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  go:
    name: Go — vet / lint / test / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60.0
          args: --timeout=5m

      - name: Unit tests (with race detector)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Build binary
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -ldflags "-X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" \
            -o bin/sangraha \
            ./cmd/sangraha

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: sangraha-linux-amd64
          path: bin/sangraha

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: sangraha-linux-amd64
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/sangraha

      - name: Run integration tests
        run: ./scripts/integration-test.sh
        # Script will be created in Sprint 1.6; skips gracefully if not present
        continue-on-error: true

  web:
    name: Web dashboard — lint / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f web/package.json ]; then
            cd web && npm ci
          else
            echo "web/package.json not yet present — skipping"
          fi

      - name: Lint
        run: |
          if [ -f web/package.json ]; then
            cd web && npm run lint
          fi

      - name: Build
        run: |
          if [ -f web/package.json ]; then
            cd web && npm run build
          fi
