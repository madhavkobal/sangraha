name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Cross-compile and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Unit tests (with race detector)
        run: go test -race ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build web dashboard
        run: |
          if [ -f web/package.json ]; then
            cd web && npm ci && npm run build
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION=$(git describe --tags --always)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p bin
          go build \
            -ldflags "-X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" \
            -o bin/sangraha-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} \
            ./cmd/sangraha

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sangraha-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/sangraha-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/

      - name: Flatten and checksum
        run: |
          mkdir -p dist
          find release/ -type f -name 'sangraha-*' -exec cp {} dist/ \;
          cd dist && sha256sum sangraha-* > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sangraha-*
            dist/SHA256SUMS
          generate_release_notes: true

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: sangraha-linux-amd64
          path: bin/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/madhavkobal/sangraha:${{ github.ref_name }}
            ghcr.io/madhavkobal/sangraha:latest
          platforms: linux/amd64
