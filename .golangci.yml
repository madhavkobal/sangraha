run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck       # all errors must be handled
    - gosimple       # idiomatic Go simplifications
    - govet          # correctness checks (shadow, printf, etc.)
    - ineffassign    # unused assignments
    - staticcheck    # comprehensive static analysis
    - unused         # no dead code
    - gocyclo        # cyclomatic complexity limit
    - gosec          # security anti-patterns
    - gofmt          # formatting compliance
    - goimports      # import ordering
    - misspell       # common spelling mistakes in comments/strings
    - revive         # fast, configurable replacement for golint
    - prealloc       # slice preallocation suggestions
    - bodyclose      # HTTP response body must be closed
    - noctx          # HTTP requests must use context

linters-settings:
  gocyclo:
    min-complexity: 15

  gosec:
    excludes:
      - G104  # allow errors in defer — handled explicitly elsewhere

  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

  govet:
    enable:
      - shadow

  gofmt:
    simplify: true

issues:
  exclude-rules:
    # Test files are allowed to use unsafe patterns (e.g. t.Fatal in goroutines)
    - path: "_test\\.go"
      linters:
        - gosec
        - errcheck

    # main.go is allowed to call os.Exit
    - path: "cmd/sangraha/main\\.go"
      linters:
        - revive

  max-issues-per-linter: 0
  max-same-issues: 0
